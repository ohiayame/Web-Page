<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 웹 검색</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #48cae4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p {
      color: #888;
      font-size: 1rem;
    }

    .search-box {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    .search-box input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid #2a2a3c;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: #6c63ff;
    }

    .search-box input::placeholder {
      color: #555;
    }

    .search-box button {
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6c63ff, #48cae4);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-box button:hover {
      opacity: 0.9;
    }

    .search-box button:active {
      transform: scale(0.97);
    }

    .search-box button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-area {
      width: 100%;
      max-width: 720px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
      color: #888;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a3c;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-card {
      display: none;
      background: #1a1a2e;
      border: 1px solid #2a2a3c;
      border-radius: 16px;
      padding: 28px;
    }

    .result-card .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a3c;
    }

    .result-card .result-header .icon {
      font-size: 1.4rem;
    }

    .result-card .result-header h2 {
      font-size: 1.1rem;
      color: #aaa;
    }

    .result-text {
      line-height: 1.8;
      font-size: 1rem;
      color: #ddd;
      word-break: break-word;
    }

    .result-text h1, .result-text h2, .result-text h3 {
      color: #fff;
      margin: 20px 0 10px;
    }

    .result-text h1 { font-size: 1.5rem; }
    .result-text h2 { font-size: 1.3rem; border-bottom: 1px solid #2a2a3c; padding-bottom: 6px; }
    .result-text h3 { font-size: 1.1rem; }

    .result-text p { margin-bottom: 12px; }

    .result-text strong { color: #fff; }

    .result-text ul, .result-text ol {
      padding-left: 24px;
      margin-bottom: 12px;
    }

    .result-text li { margin-bottom: 6px; }

    .result-text table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 0.92rem;
    }

    .result-text th {
      background: #252540;
      color: #c0b8ff;
      padding: 10px 14px;
      text-align: left;
      border: 1px solid #3a3a5c;
    }

    .result-text td {
      padding: 9px 14px;
      border: 1px solid #2a2a3c;
      vertical-align: top;
    }

    .result-text tr:nth-child(even) td {
      background: #161626;
    }

    .result-text code {
      background: #252540;
      color: #48cae4;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
    }

    .result-text pre {
      background: #252540;
      border: 1px solid #2a2a3c;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .result-text pre code {
      background: none;
      padding: 0;
      color: #e0e0e0;
    }

    .result-text blockquote {
      border-left: 3px solid #6c63ff;
      padding-left: 16px;
      color: #aaa;
      margin-bottom: 12px;
    }

    .result-text a {
      color: #48cae4;
      text-decoration: none;
    }

    .result-text a:hover {
      text-decoration: underline;
    }

    .usage-info {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #2a2a3c;
      font-size: 0.8rem;
      color: #555;
    }

    .error-card {
      display: none;
      background: #2a1a1a;
      border: 1px solid #5c2020;
      border-radius: 16px;
      padding: 20px 28px;
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔍 AI 웹 검색</h1>
    <p>궁금한 기업명을 입력하면 AI가 웹을 검색해서 답변해드립니다</p>
  </header>

  <div class="search-box">
    <input
      type="text"
      id="queryInput"
      placeholder="예: freee, softbank, "
      autofocus
    />
    <button id="searchBtn" onclick="search()">검색</button>
  </div>

  <div class="result-area">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>AI가 웹을 검색하고 있습니다...</p>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="icon">🤖</span>
        <h2>AI 검색 결과</h2>
      </div>
      <div class="result-text" id="resultText"></div>
      <div class="usage-info" id="usageInfo"></div>
    </div>

    <div class="error-card" id="errorCard"></div>
  </div>

  <script>
    marked.setOptions({ breaks: true });

    const input = document.getElementById("queryInput");
    const btn = document.getElementById("searchBtn");
    const loading = document.getElementById("loading");
    const loadingMsg = loading.querySelector("p");
    const resultCard = document.getElementById("resultCard");
    const resultText = document.getElementById("resultText");
    const usageInfo = document.getElementById("usageInfo");
    const errorCard = document.getElementById("errorCard");

    let rawText = "";

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") search();
    });

    async function search() {
      const query = input.value.trim();
      if (!query) return;

      // UI 초기화
      btn.disabled = true;
      loading.style.display = "block";
      loadingMsg.textContent = "AI가 웹을 검색하고 있습니다...";
      resultCard.style.display = "none";
      resultText.innerHTML = "";
      rawText = "";
      errorCard.style.display = "none";

      try {
        const res = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // 마지막 미완성 줄 보관

          let eventType = null;
          for (const line of lines) {
            if (line.startsWith("event: ")) {
              eventType = line.slice(7).trim();
            } else if (line.startsWith("data: ") && eventType) {
              const data = JSON.parse(line.slice(6));
              handleEvent(eventType, data);
              eventType = null;
            }
          }
        }
      } catch (err) {
        errorCard.textContent = "❌ " + err.message;
        errorCard.style.display = "block";
      } finally {
        loading.style.display = "none";
        btn.disabled = false;
      }
    }

    function handleEvent(type, data) {
      switch (type) {
        case "status":
          loadingMsg.textContent = data.message;
          break;

        case "start":
          loading.style.display = "none";
          resultCard.style.display = "block";
          break;

        case "delta":
          rawText += data.text;
          resultText.innerHTML = marked.parse(rawText);
          break;

        case "done":
          usageInfo.textContent = `입력 토큰: ${data.usage?.input_tokens ?? "-"} / 출력 토큰: ${data.usage?.output_tokens ?? "-"}`;
          break;

        case "error":
          loading.style.display = "none";
          errorCard.textContent = "❌ " + data.message;
          errorCard.style.display = "block";
          break;
      }
    }
  </script>
</body>
</html>
